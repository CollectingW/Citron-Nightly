name: Debug Android Build Path

on:
  workflow_dispatch:

jobs:
  find-build-path:
    name: Find CMakeLists Path
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: List all files to find the correct path
        run: |
          echo "---------------------------------------------------------"
          echo "Listing all files and directories from the root..."
          echo "---------------------------------------------------------"
          ls -R
          echo "---------------------------------------------------------"
          echo "Debugging step complete. The next step will fail as expected."
          echo "---------------------------------------------------------"

      - name: Attempt to configure CMake (will fail)
        run: |
          echo "This step is designed to fail. Please check the log of the step above."
          exit 1
