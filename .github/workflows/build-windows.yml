name: Build Citron (Windows)
concurrency:
  group: build-windows-nightly-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch: {}

jobs:
  build:
    name: "Citron Build (Windows)"
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Checkout Citron Source with Submodules
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          $vulkan_sdk_url = "https://sdk.lunarg.com/sdk/download/1.3.283.0/windows/VulkanSDK-1.3.283.0-Installer.exe"
          Invoke-WebRequest -Uri $vulkan_sdk_url -OutFile VulkanSDK-Installer.exe
          Start-Process -FilePath ".\VulkanSDK-Installer.exe" -ArgumentList "--accept-licenses", "--default-answer", "--confirm-command", "install" -Wait
          echo "C:\VulkanSDK\1.3.283.0\Bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Get Nightly Version
        id: version
        shell: bash
        run: |
          git fetch --tags
          VERSION=$(git rev-parse --short HEAD)
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      # --- NEW STEP 1: Patch root CMakeLists.txt for diagnostics ---
      - name: Patch Root CMakeLists to find OpenSSL Path
        shell: pwsh
        run: |
          $find_openssl_block = 'find_package(OpenSSL 1.1.1 REQUIRED)'
          $diagnostic_block = @"
          if(OPENSSL_FOUND)
              message(STATUS "OpenSSL Found by CMake!")
              message(STATUS "  => SSL Library: ${OPENSSL_SSL_LIBRARY}")
              get_filename_component(OPENSSL_LIB_DIR ${OPENSSL_SSL_LIBRARY} DIRECTORY)
              get_filename_component(OPENSSL_INSTALL_DIR ${OPENSSL_LIB_DIR} DIRECTORY)
              set(OPENSSL_BIN_DIR "${OPENSSL_INSTALL_DIR}/bin")
              message(STATUS "  => Inferred DLL Directory: ${OPENSSL_BIN_DIR}")
          endif()
          "@
          (Get-Content -Path "CMakeLists.txt" -Raw) -replace [regex]::Escape($find_openssl_block), "`$0`n${diagnostic_block}" | Set-Content -Path "CMakeLists.txt"
          echo "Patched root CMakeLists.txt to add OpenSSL diagnostics."

      # --- NEW STEP 2: Patch src/CMakeLists.txt to copy DLLs ---
      - name: Patch CMakeLists to copy OpenSSL DLLs
        shell: pwsh
        run: |
          $cmake_patch = @"

          # --- Start of dynamically added patch for OpenSSL DLLs ---
          if(ENABLE_OPENSSL AND OPENSSL_FOUND AND WIN32)
              message(STATUS "Adding post-build command to copy OpenSSL DLLs for target citron.")
              add_custom_command(
                  TARGET citron
                  POST_BUILD
                  COMMAND ${CMAKE_COMMAND} -E copy_if_different
                          "${OPENSSL_BIN_DIR}/libcrypto-1_1-x64.dll"
                          "$<TARGET_FILE_DIR:citron>"
                  COMMAND ${CMAKE_COMMAND} -E copy_if_different
                          "${OPENSSL_BIN_DIR}/libssl-1_1-x64.dll"
                          "$<TARGET_FILE_DIR:citron>"
                  COMMENT "Copying OpenSSL runtime DLLs to output directory..."
              )
          endif()
          # --- End of dynamically added patch ---
          "@
          Add-Content -Path "src\CMakeLists.txt" -Value $cmake_patch
          echo "Appended OpenSSL DLL copy command to src/CMakeLists.txt"

      - name: Configure CMake
        shell: cmd
        run: |
          cmake -B build -S . -G "Visual Studio 17 2022" -A x64 ^
            -DCITRON_USE_BUNDLED_VCPKG=ON ^
            -DCITRON_ENABLE_LTO=ON ^
            -DCITRON_USE_BUNDLED_QT=ON ^
            -DENABLE_QT6=ON ^
            -DCITRON_TESTS=OFF ^
            -DUSE_DISCORD_PRESENCE=ON ^
            -DENABLE_OPENSSL=ON

      - name: Build Citron
        shell: cmd
        run: cmake --build build --config Release --parallel

      - name: Package Windows Build
        shell: pwsh
        run: |
          mkdir dist
          echo "Creating final zip archive..."
          Compress-Archive -Path ".\build\bin\Release\*" -DestinationPath ".\dist\Citron-windows-nightly-${{ steps.version.outputs.VERSION }}.zip"

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: Citron-Windows-Nightly
          path: "dist/*.zip"

  # The release job remains unchanged
  release:
    if: ${{ github.ref_name == 'main' }}
    name: "Release"
    needs: [build]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Citron-Windows-Nightly
          path: .
      - name: Get Version from Filename
        shell: bash
        run: |
          FILENAME=$(ls *.zip)
          VERSION=${FILENAME#Citron-windows-nightly-}
          VERSION=${VERSION%.zip}
          echo "APP_VERSION=${VERSION}" >> $GITHUB_ENV
      - name: Delete Previous Release
        run: gh release delete "nightly-windows" --repo "${{ github.repository }}" --cleanup-tag -y || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Release Artifacts
        uses: softprops/action-gh-release@v2
        with:
          name: "Continuous Build (Windows Nightly: ${{ env.APP_VERSION }})"
          tag_name: "nightly-windows"
          prerelease: true
          files: "*.zip"
