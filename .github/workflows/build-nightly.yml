name: Build Citron (Linux Nightly)
concurrency:
  group: build-nightly-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch: {}

jobs:
  build:
    name: "${{ matrix.name }}"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      matrix:
        include:
          - name: "Citron Build (Normal x86_64)"
            arch_suffix: ""
            build_arg: ""
          - name: "Citron Build (Optimized x86_64)"
            arch_suffix: "_v3"
            build_arg: "v3"
          - name: "Citron Build (Normal PGO x86_64)"
            arch_suffix: "_pgo"
            build_arg: "pgo"
          - name: "Citron Build (Optimized PGO x86_64)"
            arch_suffix: "_v3_pgo"
            build_arg: "v3-pgo"

    container: ghcr.io/pkgforge-dev/archlinux:latest

    steps:
      - name: Install Git
        run: pacman -Syu --noconfirm --needed git

      - name: Cache Pacman packages
        uses: actions/cache@v4
        with:
          path: /var/cache/pacman/pkg
          key: ${{ runner.os }}-pacman-${{ hashFiles('**/get-dependencies.sh') }}
          restore-keys: |
            ${{ runner.os }}-pacman-

      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: 'recursive'

      - name: Install dependencies
        run: chmod +x ./get-dependencies.sh && ./get-dependencies.sh

      - name: Build Citron from source
        run: |
          NPROC_VAL=$(nproc --all)
          JOBS_VAL=$((NPROC_VAL > 4 ? 4 : NPROC_VAL))
          chmod +x ./build-citron.sh
          JOBS=${JOBS_VAL} DEVEL=true ./build-citron.sh ${{ matrix.build_arg }}

      - name: Package and Name Artifacts
        run: |
          # Part 1: Run the package script with a fixed temporary name
          echo "--- Packaging with temporary name ---"
          chmod +x ./package-citron.sh
          APP_VERSION="temp" ARCH_SUFFIX="" DEVEL=true ./package-citron.sh

          # Part 2: Get the version hash inside this same step
          GIT_SHA=$(git rev-parse --short HEAD)
          echo "Git SHA for renaming is: [${GIT_SHA}]"

          # Part 3: Construct the final name and rename the files
          FINAL_NAME="citron_nightly-${GIT_SHA}-linux-x86_64${{ matrix.arch_suffix }}"
          echo "Final artifact base name will be: ${FINAL_NAME}"

          # Move the predictable temp files to their final, unique names
          mv -v ./dist/citron_nightly-temp-linux-x86_64.AppImage "./dist/${FINAL_NAME}.AppImage"
          mv -v ./dist/citron_nightly-temp-linux-x86_64.tar.zst "./dist/${FINAL_NAME}.tar.zst"

          echo "--- Final files in dist/ directory ---"
          ls -l ./dist

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Artifacts${{ matrix.arch_suffix }}
          path: dist/

  release:
    if: ${{ github.ref_name == 'main' }}
    name: "release"
    needs: [build]
    permissions:
      actions: read
      security-events: write
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Set Version
        run: echo "APP_VERSION=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: Artifacts*
          merge-multiple: true
          path: .

      - name: Del Previous Release
        run: gh release delete "nightly-linux" --repo "${GITHUB_REPOSITORY}" --cleanup-tag -y && sleep 5
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        continue-on-error: true

      - uses: softprops/action-gh-release@v2
        with:
          name: "Continuous Build (Linux Nightly: ${{ env.APP_VERSION }})"
          tag_name: "nightly-linux"
          prerelease: true
          draft: false
          generate_release_notes: false
          make_latest: false
          files: |
            *.AppImage*
            *.tar.zst
