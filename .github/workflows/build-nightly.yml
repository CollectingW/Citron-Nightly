name: Build Citron (Nightly)
concurrency:
  group: build-nightly-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch: {}

jobs:
  build:
    name: "${{ matrix.name }}"
    runs-on: ubuntu-latest
    timeout-minutes: 90 # Increased timeout for longer PGO builds
    strategy:
      matrix:
        include:
          - name: "Citron Build (Normal)"
            arch: x86_64
            arch_suffix: ""
            build_arg: ""
          - name: "Citron Build (Optimized)"
            arch: x86_64
            arch_suffix: "_v3"
            build_arg: "v3"
          - name: "Citron Build (Normal PGO)"
            arch: x86_64
            arch_suffix: "_pgo"
            build_arg: "pgo"
          - name: "Citron Build (Optimized PGO)"
            arch: x86_64
            arch_suffix: "_v3_pgo"
            build_arg: "v3-pgo"

    container: ghcr.io/pkgforge-dev/archlinux:latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: 'recursive'

      - name: Install dependencies
        run: chmod +x ./get-dependencies.sh && ./get-dependencies.sh

      - name: Build Citron from source
        run: |
          NPROC_VAL=$(nproc --all)
          # PGO builds can be memory intensive, so we use a safer job count
          if [[ "${{ matrix.build_arg }}" == *pgo* ]]; then
            JOBS_VAL=$((NPROC_VAL > 4 ? 4 : NPROC_VAL))
          else
            JOBS_VAL=$((NPROC_VAL > 2 ? NPROC_VAL / 2 : 1))
          fi
          
          chmod +x ./build-citron.sh
          # Dynamically pass the correct argument while keeping DEVEL=true
          JOBS=${JOBS_VAL} DEVEL=true ./build-citron.sh ${{ matrix.build_arg }}

      - name: Package AppImage
        run: |
          chmod +x ./package-citron.sh
          ARCH_SUFFIX=${{ matrix.arch_suffix }} DEVEL=true ./package-citron.sh

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          # Simplified and more reliable artifact naming
          name: AppImage${{ matrix.arch_suffix }}
          path: "dist/*.AppImage*"

      - name: Upload version file
        # Only upload version once from the main normal build
        if: ${{ matrix.build_arg == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: version
          path: "dist/version"

  release:
    if: ${{ github.ref_name == 'main' }}
    name: "release"
    needs: [build]
    permissions:
      actions: read
      security-events: write
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: AppImage*
          merge-multiple: true
          path: .

      - uses: actions/download-artifact@v4
        with:
          name: version
          path: .

      - name: Read version
        run: |
          export VERSION="$(cat version)"
          echo "APP_VERSION=${VERSION}" >> "${GITHUB_ENV}"

      - name: Del Previous Release
        run: gh release delete "nightly" --repo "${GITHUB_REPOSITORY}" --cleanup-tag -y && sleep 5
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        continue-on-error: true

      - uses: softprops/action-gh-release@v2
        with:
          name: "Continuous Build (Nightly Version: ${{ env.APP_VERSION }})"
          tag_name: "nightly"
          prerelease: true
          draft: false
          generate_release_notes: false
          make_latest: false
          files: |
            *.AppImage*
            *.tar.zst
