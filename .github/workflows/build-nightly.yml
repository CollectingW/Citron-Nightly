name: Build Citron (Nightly)
concurrency:
  group: build-nightly-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch: {}

jobs:
  build-x86_64:
    name: "${{ matrix.name }}"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      matrix:
        include:
          - name: "Citron Build (Normal x86_64)"
            arch_suffix: ""
            build_arg: ""
          - name: "Citron Build (Optimized x86_64)"
            arch_suffix: "_v3"
            build_arg: "v3"
          - name: "Citron Build (Normal PGO x86_64)"
            arch_suffix: "_pgo"
            build_arg: "pgo"
          - name: "Citron Build (Optimized PGO x86_64)"
            arch_suffix: "_v3_pgo"
            build_arg: "v3-pgo"

    container: ghcr.io/pkgforge-dev/archlinux:latest

    steps:
      - name: Install Git
        run: pacman -Syu --noconfirm --needed git

      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: 'recursive'

      - name: Install dependencies
        run: chmod +x ./get-dependencies.sh && ./get-dependencies.sh

      - name: Build Citron from source
        run: |
          NPROC_VAL=$(nproc --all)
          JOBS_VAL=$((NPROC_VAL > 4 ? 4 : NPROC_VAL))
          chmod +x ./build-citron.sh
          JOBS=${JOBS_VAL} DEVEL=true ./build-citron.sh ${{ matrix.build_arg }}

      - name: Package AppImage
        run: |
          chmod +x ./package-citron.sh
          ARCH_SUFFIX=${{ matrix.arch_suffix }} DEVEL=true ./package-citron.sh

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: AppImage${{ matrix.arch_suffix }}
          path: "dist/*.AppImage*"

      - name: Upload version file
        if: ${{ matrix.build_arg == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: version
          path: "dist/version"

  build-aarch64:
    name: "Citron Build (aarch64)"
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: 'recursive'

      - name: Run Build in aarch64 Container
        run: |
          docker run --rm --platform linux/aarch64 -v ${{ github.workspace }}:${{ github.workspace }} -w ${{ github.workspace }} \
          ghcr.io/pkgforge-dev/archlinux:latest \
          sh -c '
            set -ex
            # 1. Install Dependencies
            chmod +x ./get-dependencies.sh && ./get-dependencies.sh
            
            # 2. Build Citron
            NPROC_VAL=$(nproc --all)
            JOBS_VAL=$((NPROC_VAL > 4 ? 4 : NPROC_VAL))
            chmod +x ./build-citron.sh
            JOBS=${JOBS_VAL} DEVEL=true ./build-citron.sh

            # 3. Package AppImage
            chmod +x ./package-citron.sh
            ARCH_SUFFIX="_aarch64" DEVEL=true ./package-citron.sh
          '
      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: AppImage_aarch64
          path: "dist/*.AppImage*"

  release:
    if: ${{ github.ref_name == 'main' }}
    name: "release"
    needs: [build-x86_64, build-aarch64]
    permissions:
      actions: read
      security-events: write
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: AppImage*
          merge-multiple: true
          path: .

      - uses: actions/download-artifact@v4
        with:
          name: version
          path: .

      - name: Read version
        run: |
          export VERSION="$(cat version)"
          echo "APP_VERSION=${VERSION}" >> "${GITHUB_ENV}"

      - name: Del Previous Release
        run: gh release delete "nightly" --repo "${GITHUB_REPOSITORY}" --cleanup-tag -y && sleep 5
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        continue-on-error: true

      - uses: softprops/action-gh-release@v2
        with:
          name: "Continuous Build (Nightly Version: ${{ env.APP_VERSION }})"
          tag_name: "nightly"
          prerelease: true
          draft: false
          generate_release_notes: false
          make_latest: false
          files: |
            *.AppImage*
            *.tar.zst
