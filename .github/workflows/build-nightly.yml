name: Build Citron (Linux Nightly)
concurrency:
  group: build-nightly-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch: {}

jobs:
  build:
    name: "${{ matrix.name }}"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      matrix:
        include:
          - name: "Citron Build (Normal x86_64)"
            arch_suffix: ""
            build_arg: ""
          - name: "Citron Build (Optimized x86_64)"
            arch_suffix: "_v3"
            build_arg: "v3"
          - name: "Citron Build (Normal PGO x86_64)"
            arch_suffix: "_pgo"
            build_arg: "pgo"
          - name: "Citron Build (Optimized PGO x86_64)"
            arch_suffix: "_v3_pgo"
            build_arg: "v3-pgo"

    container: ghcr.io/pkgforge-dev/archlinux:latest

    steps:
      - name: Install Git
        run: pacman -Syu --noconfirm --needed git

      - name: Cache Pacman packages
        uses: actions/cache@v4
        with:
          path: /var/cache/pacman/pkg
          key: ${{ runner.os }}-pacman-${{ hashFiles('**/get-dependencies.sh') }}
          restore-keys: |
            ${{ runner.os }}-pacman-

      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: 'recursive'

      - name: Set Version
        id: version # This ID is crucial
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: chmod +x ./get-dependencies.sh && ./get-dependencies.sh

      - name: Build Citron from source
        run: |
          NPROC_VAL=$(nproc --all)
          JOBS_VAL=$((NPROC_VAL > 4 ? 4 : NPROC_VAL))
          chmod +x ./build-citron.sh
          JOBS=${JOBS_VAL} DEVEL=true ./build-citron.sh ${{ matrix.build_arg }}

      - name: Package AppImage

        run: |
          export APP_VERSION="${{ steps.version.outputs.sha }}"
          
          export ARCH_SUFFIX="${{ matrix.arch_suffix }}"
          export DEVEL="true"

          echo "Running package script with APP_VERSION: [${APP_VERSION}]"
          
          chmod +x ./package-citron.sh
          ./package-citron.sh
  
  release:
    if: ${{ github.ref_name == 'main' }}
    name: "release"
    needs: [build]
    permissions:
      actions: read
      security-events: write
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Set Version
      
        run: echo "APP_VERSION=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: Artifacts*
          merge-multiple: true
          path: .

      - name: Del Previous Release
        run: gh release delete "nightly-linux" --repo "${GITHUB_REPOSITORY}" --cleanup-tag -y && sleep 5
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        continue-on-error: true

      - uses: softprops/action-gh-release@v2
        with:
          name: "Continuous Build (Linux Nightly: ${{ env.APP_VERSION }})"
          tag_name: "nightly-linux"
          prerelease: true
          draft: false
          generate_release_notes: false
          make_latest: false
          files: |
            *.AppImage*
            *.tar.zst
