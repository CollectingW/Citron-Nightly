name: Build Citron (Windows Nightly)
concurrency:
  group: build-windows-nightly-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: "30 8 * * *"
  workflow_dispatch: {}

jobs:
  build:
    name: "Citron Build (Windows)"
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          $vulkan_sdk_url = "https://sdk.lunarg.com/sdk/download/1.3.283.0/windows/VulkanSDK-1.3.283.0-Installer.exe"
          Invoke-WebRequest -Uri $vulkan_sdk_url -OutFile VulkanSDK-Installer.exe
          Start-Process -FilePath ".\VulkanSDK-Installer.exe" -ArgumentList "--accept-licenses", "--default-answer", "--confirm-command", "install" -Wait
          echo "C:\VulkanSDK\1.3.283.0\Bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Clone Citron Source
        shell: bash
        run: git clone --recursive "https://git.citron-emu.org/citron/emulator.git" citron

      - name: Get Nightly Version
        id: version
        working-directory: ./citron
        shell: bash
        run: |
          git fetch --tags
          VERSION=$(git rev-parse --short HEAD)
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: Create Custom Vcpkg Manifest
        working-directory: ./citron
        shell: pwsh
        run: |
          @"
          {
              "`$schema": "https://raw.githubusercontent.com/microsoft/vcpkg-tool/main/docs/vcpkg.schema.json",
              "name": "citron-ci",
              "builtin-baseline": "bc994510d2eb11aac7b43b03f67a7751d5bfe0e4",
              "dependencies": [
                  "boost-algorithm", "boost-asio", "boost-bind", "boost-config",
                  "boost-container", "boost-context", "boost-crc", "boost-functional",
                  "boost-heap", "boost-icl", "boost-intrusive", "boost-mpl",
                  { "name": "boost-process", "platform": "!android" },
                  "boost-range", "boost-spirit", "boost-test", "boost-timer", "boost-variant",
                  "enet", "fmt", "lz4", "nlohmann-json", "openal-soft", "opus", "libusb",
                  "qtbase", "qtsvg", "sdl2", "zlib", "zstd"
              ]
          }
          "@ | Set-Content -Path "vcpkg-ci.json"

      - name: Configure CMake
        working-directory: ./citron
        shell: cmd
        run: |
          cmake -B build -S . -G "Visual Studio 17 2022" -A x64 ^
            -DCMAKE_TOOLCHAIN_FILE=externals/vcpkg/scripts/buildsystems/vcpkg.cmake ^
            -DVCPKG_MANIFEST_PATH=vcpkg-ci.json ^
            -DCITRON_USE_BUNDLED_VCPKG=ON ^
            -DCITRON_ENABLE_LTO=ON ^
            -DCITRON_TESTS=OFF

      - name: Build Citron
        working-directory: ./citron
        shell: cmd
        run: cmake --build build --config Release --parallel

      # Step 1: Add a debug step to list the contents of the vcpkg directory for verification.
      - name: Debug - List Vcpkg Installed Contents
        shell: pwsh
        run: |
          $vcpkg_dir = ".\citron\build\vcpkg_installed\x64-windows"
          if (Test-Path $vcpkg_dir) {
            echo "--- Listing contents of $vcpkg_dir ---"
            Get-ChildItem -Path $vcpkg_dir -Recurse | Select-Object FullName
          } else {
            echo "Error: vcpkg installed directory not found at $vcpkg_dir"
            exit 1
          }

      # Step 2: Rewrite the packaging step to dynamically FIND the required files.
      - name: Package Windows Build
        shell: pwsh
        run: |
          # 1. Define the base search path.
          $VCPKG_INSTALL_PATH = ".\citron\build\vcpkg_installed\x64-windows"
          
          # 2. Dynamically find the directory that contains the Qt DLLs.
          echo "Searching for Qt Core DLL..."
          $qt_core_dll = Get-ChildItem -Path $VCPKG_INSTALL_PATH -Recurse -Filter "Qt6Core.dll" | Select-Object -First 1
          if (-not $qt_core_dll) {
            echo "FATAL: Qt6Core.dll not found after build. The vcpkg installation failed."
            exit 1
          }
          $QT_BIN_DIR = $qt_core_dll.DirectoryName
          echo "Found Qt binaries in: $QT_BIN_DIR"

          # 3. Dynamically find the Qt 'plugins' directory.
          echo "Searching for Qt plugins directory..."
          $qwindows_plugin = Get-ChildItem -Path $VCPKG_INSTALL_PATH -Recurse -Filter "qwindows.dll" | Select-Object -First 1
          $QT_PLUGINS_DIR = $qwindows_plugin.Directory.Parent.FullName
          echo "Found Qt plugins in: $QT_PLUGINS_DIR"
          
          # 4. Create the package directory and copy files from the paths we just found.
          mkdir package
          echo "Copying executables..."
          Copy-Item -Path ".\citron\build\bin\Release\*.exe" -Destination ".\package\"
          
          echo "Copying runtime DLLs from $QT_BIN_DIR..."
          Copy-Item -Path "$QT_BIN_DIR\Qt6Core.dll" -Destination ".\package\"
          Copy-Item -Path "$QT_BIN_DIR\Qt6Gui.dll" -Destination ".\package\"
          Copy-Item -Path "$QT_BIN_DIR\Qt6Widgets.dll" -Destination ".\package\"
          Copy-Item -Path "$QT_BIN_DIR\Qt6Network.dll" -Destination ".\package\"
          Copy-Item -Path "$QT_BIN_DIR\Qt6Svg.dll" -Destination ".\package\"
          Copy-Item -Path "$QT_BIN_DIR\SDL2.dll" -Destination ".\package\"
          Copy-Item -Path "$QT_BIN_DIR\enet.dll" -Destination ".\package\"
          Copy-Item -Path "$QT_BIN_DIR\openal-soft.dll" -Destination ".\package\"
          
          echo "Copying Qt plugins from $QT_PLUGINS_DIR..."
          Copy-Item -Path "$QT_PLUGINS_DIR\platforms" -Destination ".\package\platforms" -Recurse
          Copy-Item -Path "$QT_PLUGINS_DIR\styles" -Destination ".\package\styles" -Recurse
          
          # 5. Create the final archive.
          mkdir dist
          echo "Creating final zip archive..."
          Compress-Archive -Path ".\package\*" -DestinationPath ".\dist\Citron-windows-nightly-${{ steps.version.outputs.VERSION }}.zip"

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: Citron-Windows-Nightly
          path: "dist/*.zip"

  release:
    if: ${{ github.ref_name == 'main' }}
    name: "Release"
    needs: [build]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Citron-Windows-Nightly
          path: .
      - name: Get Version from Filename
        shell: bash
        run: |
          FILENAME=$(ls *.zip)
          VERSION=${FILENAME#Citron-nightly-}
          VERSION=${VERSION%.zip}
          echo "APP_VERSION=${VERSION}" >> $GITHUB_ENV
      - name: Delete Previous Release
        run: gh release delete "nightly-windows" --repo "${{ github.repository }}" --cleanup-tag -y || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Release Artifacts
        uses: softprops/action-gh-release@v2
        with:
          name: "Continuous Build (Windows Nightly: ${{ env.APP_VERSION }})"
          tag_name: "nightly-windows"
          prerelease: true
          files: "*.zip"
