name: Build Citron (Windows Nightly)
concurrency:
  group: build-windows-nightly-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: "30 8 * * *"
  workflow_dispatch: {}

jobs:
  build:
    name: "Citron Build (Windows)"
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          $vulkan_sdk_url = "https://sdk.lunarg.com/sdk/download/1.3.283.0/windows/VulkanSDK-1.3.283.0-Installer.exe"
          Invoke-WebRequest -Uri $vulkan_sdk_url -OutFile VulkanSDK-Installer.exe
          Start-Process -FilePath ".\VulkanSDK-Installer.exe" -ArgumentList "--accept-licenses", "--default-answer", "--confirm-command", "install" -Wait
          echo "C:\VulkanSDK\1.3.283.0\Bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Clone Citron Source
        shell: bash
        run: git clone --recursive "https://git.citron-emu.org/citron/emulator.git" citron

      - name: Get Nightly Version
        id: version
        working-directory: ./citron
        shell: bash
        run: |
          git fetch --tags
          VERSION=$(git rev-parse --short HEAD)
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: Create Custom Vcpkg Manifest
        working-directory: ./citron
        shell: pwsh
        run: |
          @"
          {
              "`$schema": "https://raw.githubusercontent.com/microsoft/vcpkg-tool/main/docs/vcpkg.schema.json",
              "name": "citron-ci",
              "builtin-baseline": "bc994510d2eb11aac7b43b03f67a7751d5bfe0e4",
              "dependencies": [
                  "boost-algorithm", "boost-asio", "boost-bind", "boost-config",
                  "boost-container", "boost-context", "boost-crc", "boost-functional",
                  "boost-heap", "boost-icl", "boost-intrusive", "boost-mpl",
                  { "name": "boost-process", "platform": "!android" },
                  "boost-range", "boost-spirit", "boost-test", "boost-timer", "boost-variant",
                  "enet", "fmt", "lz4", "nlohmann-json", "openal-soft", "opus", "libusb",
                  "qtbase", "qtsvg", "sdl2", "zlib", "zstd"
              ]
          }
          "@ | Set-Content -Path "vcpkg-ci.json"

      - name: Configure CMake
        working-directory: ./citron
        shell: cmd
        run: |
          cmake -B build -S . -G "Visual Studio 17 2022" -A x64 ^
            -DCMAKE_TOOLCHAIN_FILE=externals/vcpkg/scripts/buildsystems/vcpkg.cmake ^
            -DVCPKG_MANIFEST_PATH=vcpkg-ci.json ^
            -DCITRON_USE_BUNDLED_VCPKG=ON ^
            -DCITRON_ENABLE_LTO=ON ^
            -DCITRON_TESTS=OFF

      - name: Build Citron
        working-directory: ./citron
        shell: cmd
        run: cmake --build build --config Release --parallel

      - name: Package Windows Build
        shell: pwsh
        run: |
          # 1. Define the source of our dependencies. This is now a reliable path.
          $VCPKG_INSTALL_PATH = ".\citron\build\vcpkg_installed\x64-windows"
          
          # 2. Create a clean 'package' directory.
          mkdir package
          
          # 3. Copy the compiled executables.
          echo "Copying executables..."
          Copy-Item -Path ".\citron\build\bin\Release\*.exe" -Destination ".\package\"
          
          # 4. Manually copy all required DLLs from the vcpkg bin directory.
          echo "Copying runtime DLLs..."
          Copy-Item -Path "$VCPKG_INSTALL_PATH\bin\Qt6Core.dll" -Destination ".\package\"
          Copy-Item -Path "$VCPKG_INSTALL_PATH\bin\Qt6Gui.dll" -Destination ".\package\"
          Copy-Item -Path "$VCPKG_INSTALL_PATH\bin\Qt6Widgets.dll" -Destination ".\package\"
          Copy-Item -Path "$VCPKG_INSTALL_PATH\bin\Qt6Network.dll" -Destination ".\package\"
          Copy-Item -Path "$VCPKG_INSTALL_PATH\bin\Qt6Svg.dll" -Destination ".\package\"
          Copy-Item -Path "$VCPKG_INSTALL_PATH\bin\SDL2.dll" -Destination ".\package\"
          Copy-Item -Path "$VCPKG_INSTALL_PATH\bin\enet.dll" -Destination ".\package\"
          Copy-Item -Path "$VCPKG_INSTALL_PATH\bin\openal-soft.dll" -Destination ".\package\"
          # Add any other required DLLs here if the app fails to start
          
          # 5. Manually copy the critical Qt plugins folder.
          echo "Copying Qt plugins..."
          Copy-Item -Path "$VCPKG_INSTALL_PATH\plugins\platforms" -Destination ".\package\platforms" -Recurse
          Copy-Item -Path "$VCPKG_INSTALL_PATH\plugins\styles" -Destination ".\package\styles" -Recurse
          
          # 6. Create the final .zip archive.
          mkdir dist
          echo "Creating final zip archive..."
          Compress-Archive -Path ".\package\*" -DestinationPath ".\dist\Citron-windows-nightly-${{ steps.version.outputs.VERSION }}.zip"

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: Citron-Windows-Nightly
          path: "dist/*.zip"

  release:
    if: ${{ github.ref_name == 'main' }}
    name: "Release"
    needs: [build]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Citron-Windows-Nightly
          path: .
      - name: Get Version from Filename
        shell: bash
        run: |
          FILENAME=$(ls *.zip)
          VERSION=${FILENAME#Citron-windows-nightly-}
          VERSION=${VERSION%.zip}
          echo "APP_VERSION=${VERSION}" >> $GITHUB_ENV
      - name: Delete Previous Release
        run: gh release delete "nightly-windows" --repo "${{ github.repository }}" --cleanup-tag -y || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Release Artifacts
        uses: softprops/action-gh-release@v2
        with:
          name: "Continuous Build (Windows Nightly: ${{ env.APP_VERSION }})"
          tag_name: "nightly-windows"
          prerelease: true
          files: "*.zip"
