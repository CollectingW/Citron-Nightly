name: Build Citron (Windows Nightly)
concurrency:
  group: build-windows-nightly-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: "30 8 * * *"
  workflow_dispatch: {}

jobs:
  build:
    name: "Citron Build (Windows)"
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          $vulkan_sdk_url = "https://sdk.lunarg.com/sdk/download/1.3.283.0/windows/VulkanSDK-1.3.283.0-Installer.exe"
          Invoke-WebRequest -Uri $vulkan_sdk_url -OutFile VulkanSDK-Installer.exe
          Start-Process -FilePath ".\VulkanSDK-Installer.exe" -ArgumentList "--accept-licenses", "--default-answer", "--confirm-command", "install" -Wait
          echo "C:\VulkanSDK\1.3.283.0\Bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Clone Citron Source
        shell: bash
        run: git clone --recursive "https://git.citron-emu.org/citron/emulator.git" citron

      - name: Get Nightly Version
        id: version
        working-directory: ./citron
        shell: bash
        run: |
          git fetch --tags
          VERSION=$(git rev-parse --short HEAD)
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: Configure CMake
        working-directory: ./citron
        shell: cmd
        run: |
          cmake -B build -S . -G "Visual Studio 17 2022" -A x64 ^
            -DCITRON_USE_BUNDLED_VCPKG=ON ^
            -DCITRON_ENABLE_LTO=ON ^
            -DCITRON_USE_BUNDLED_QT=OFF ^
            -DUSE_SYSTEM_QT=OFF ^
            -DENABLE_QT6=ON ^
            -DCITRON_TESTS=OFF

      - name: Build Citron
        working-directory: ./citron
        shell: cmd
        run: cmake --build build --config Release --parallel

      - name: Add windeployqt to PATH
        shell: pwsh
        run: |
          # 1. Find the Qt installation directory on the runner.
          $qt_path = (Get-ChildItem -Path "C:\Qt\*\msvc*\bin\windeployqt.exe" -Recurse | Select-Object -First 1).DirectoryName
          if (-not $qt_path) {
            echo "Error: windeployqt.exe not found on the runner."
            exit 1
          }
          echo "Found Qt tools at $qt_path"
          # 2. Add this directory to the GITHUB_PATH so we can call windeployqt directly.
          echo $qt_path | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Package Windows Build
        shell: pwsh
        run: |
          # 1. Create a clean 'package' directory.
          mkdir package
          
          # 2. Copy the compiled executables.
          echo "Copying executables..."
          Copy-Item -Path ".\citron\build\bin\Release\*" -Destination ".\package\" -Recurse
          
          # 3. Change directory to where the executables are, as windeployqt works best from there.
          Set-Location ".\package"
          
          # 4. Run windeployqt. It is now in the PATH and will find all dependencies.
          echo "Running windeployqt..."
          windeployqt.exe --no-translations --no-compiler-runtime
          
          # 5. Manually copy any non-Qt dependencies.
          $VCPKG_BIN_PATH = "..\citron\build\vcpkg_installed\x64-windows\bin"
          echo "Copying non-Qt DLLs (like SDL2)..."
          Copy-Item -Path "$VCPKG_BIN_PATH\SDL2.dll" -Destination "."
          
          # 6. Go back to the root and create the final .zip archive.
          Set-Location ".."
          mkdir dist
          echo "Creating final zip archive..."
          Compress-Archive -Path ".\package\*" -DestinationPath ".\dist\Citron-windows-nightly-${{ steps.version.outputs.VERSION }}.zip"

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: Citron-Windows-Nightly
          path: "dist/*.zip"

  release:
    if: ${{ github.ref_name == 'main' }}
    name: "Release"
    needs: [build]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Citron-Windows-Nightly
          path: .
      - name: Get Version from Filename
        shell: bash
        run: |
          FILENAME=$(ls *.zip)
          VERSION=${FILENAME#Citron-windows-nightly-}
          VERSION=${VERSION%.zip}
          echo "APP_VERSION=${VERSION}" >> $GITHUB_ENV
      - name: Delete Previous Release
        run: gh release delete "nightly-windows" --repo "${{ github.repository }}" --cleanup-tag -y || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Release Artifacts
        uses: softprops/action-gh-release@v2
        with:
          name: "Continuous Build (Windows Nightly: ${{ env.APP_VERSION }})"
          tag_name: "nightly-windows"
          prerelease: true
          files: "*.zip"
