name: Test ARM Runner Availability

on:
  workflow_dispatch: # This allows you to trigger it manually from the Actions tab

jobs:
  arm-test-job:
    name: ARM Runner Test
    runs-on: ubuntu-latest-arm64 # This is the specific runner we are testing

    steps:
      - name: Check Architecture
        run: |
          echo "Hello from the ARM runner!"
          echo "If you see this message, the job was successfully picked up."
          echo "The machine architecture is:"
          uname -m
